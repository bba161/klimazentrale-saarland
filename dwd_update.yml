name: DWD Daten stündlich aktualisieren

on:
  schedule:
    # Stündlich um xx:10 UTC – leichte Verzögerung damit DWD-Daten bereit sind
    - cron: '10 * * * *'
  workflow_dispatch:  # Erlaubt manuelle Ausführung per Klick

jobs:
  fetch-dwd:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Erlaubt Schreiben in den Branch

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy beautifulsoup4 lxml

      - name: DWD-Daten abrufen (stündlich, nur recent)
        run: python fetch_dwd.py

      - name: Klimanormale täglich neu berechnen
        # Jeden Tag um 02:10 UTC ODER bei manueller Ausführung
        if: github.event_name == 'workflow_dispatch'
        run: RECALC_HISTORICAL=true python fetch_dwd.py

      - name: JSON committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dwd_saarland.json
          git diff --staged --quiet || git commit -m "DWD-Update $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
